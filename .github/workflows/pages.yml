name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to GitHub Pages so it can be opened in
# Safari (or any browser) at the project Pages URL. Runs on the 3.8 branch + main,
# and can be triggered manually. Requires Settings → Pages → Source = "GitHub Actions".
on:
  push:
    branches:
      - main
      - claude/lockdown-life-3d-game-4ere1s
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deployment at a time; let an in-progress run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true   # auto-enable Pages (GitHub Actions source) — no manual Settings step
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
